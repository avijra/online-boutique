apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: buildah-build
  namespace: online-boutique-cicd
spec:
  params:
    - name: service
      type: string
      description: "Single service name to build"
    - name: revision
      type: string
      description: "Git commit SHA for image tag"
    - name: image_registry
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
    - name: image_namespace
      type: string
      default: "online-boutique-cicd"
  workspaces:
    - name: source
  results:
    - name: image_digest
    - name: image_url
  steps:
    - name: build
      image: quay.io/buildah/stable:latest
      workingDir: /workspace/source
      securityContext:
        capabilities:
          add: ["SETFCAP"]
      script: |
        #!/bin/bash
        set -euo pipefail

        SVC="$(params.service)"
        REG="$(params.image_registry)/$(params.image_namespace)"
        TAG="${SVC}:$(params.revision)"
        FULL_IMG="${REG}/${TAG}"

        echo "=== buildah-build: ${SVC} ==="
        echo "Image: ${FULL_IMG}"

        # Find Dockerfile
        if [ -f "src/${SVC}/Dockerfile" ]; then
          DOCKERFILE="src/${SVC}/Dockerfile"
          CONTEXT="src/${SVC}/"
        else
          DOCKERFILE=$(find src -path "*/${SVC}/*/Dockerfile" -o -name "Dockerfile" 2>/dev/null | head -1 || true)
          if [ -z "${DOCKERFILE}" ]; then
            echo "[FAIL] Cannot find Dockerfile for ${SVC}"
            exit 1
          fi
          CONTEXT=$(dirname "${DOCKERFILE}")
        fi

        echo "Dockerfile: ${DOCKERFILE}"
        echo "Context: ${CONTEXT}"

        # Configure unqualified search registries so buildah can pull from Docker Hub
        mkdir -p /tmp/containers
        cat > /tmp/containers/registries.conf <<'REGEOF'
unqualified-search-registries = ["docker.io", "quay.io", "registry.fedoraproject.org"]

[[registry]]
prefix = "docker.io"
location = "docker.io"
REGEOF

        echo "=== Building ${SVC} ==="
        buildah bud \
          --storage-driver=overlay \
          --tls-verify=false \
          --registries-conf /tmp/containers/registries.conf \
          -f "${DOCKERFILE}" \
          -t "${FULL_IMG}" \
          "${CONTEXT}"

        echo "=== Pushing ${FULL_IMG} ==="
        buildah push --storage-driver=overlay --tls-verify=false "${FULL_IMG}"

        # Get digest
        DIGEST=$(buildah inspect --type image "${FULL_IMG}" 2>/dev/null | grep -o '"digest":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "unknown")
        echo -n "${DIGEST}" | tee /tekton/results/image_digest
        echo -n "${FULL_IMG}" | tee /tekton/results/image_url
        echo "[OK] ${FULL_IMG} built and pushed."
