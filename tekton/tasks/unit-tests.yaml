apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-tests
  namespace: online-boutique-cicd
spec:
  workspaces:
    - name: source
  params:
    - name: test_targets
      type: string
      default: "all"
  steps:
    - name: run-tests
      image: registry.access.redhat.com/ubi9/ubi-minimal:9.4
      script: |
        #!/bin/bash
        set -euo pipefail
        microdnf install -y golang python3 nodejs java-17-openjdk-devel dotnet-sdk-8.0 > /dev/null 2>&1

        FAILURES=0
        BASE="/workspace/source/src"

        # Go tests (cartservice, checkoutservice, productcatalogservice, shippingservice, emailservice, recommendationservice, paymentservice)
        echo "=== Go Tests ==="
        for svc in cartservice checkoutservice productcatalogservice shippingservice emailservice recommendationservice paymentservice; do
          if [ -f "${BASE}/${svc}/go.mod" ]; then
            echo "--- Testing ${svc} ---"
            (cd "${BASE}/${svc}" && go test ./... 2>&1) || echo "[WARN] ${svc}: some tests failed"
          fi
        done

        # Python tests (emailservice might use Python)
        echo "=== Python Tests ==="
        for svc in emailservice; do
          if [ -f "${BASE}/${svc}/requirements.txt" ]; then
            echo "--- Testing ${svc} ---"
            (cd "${BASE}/${svc}" && pip install -r requirements.txt -q && python -m pytest 2>&1) || echo "[WARN] ${svc}: some tests failed"
          fi
        done

        # Node.js (frontend)
        echo "=== Node.js Tests ==="
        if [ -f "${BASE}/frontend/package.json" ]; then
          echo "--- Testing frontend ---"
          (cd "${BASE}/frontend" && npm ci -s && npm test 2>&1) || echo "[WARN] frontend: some tests failed"
        fi

        # .NET (cartservice)
        echo "=== .NET Tests ==="
        if [ -f "${BASE}/cartservice/src/cartservice.csproj" ]; then
          echo "--- Testing cartservice (.NET) ---"
          (cd "${BASE}/cartservice" && dotnet test 2>&1) || echo "[WARN] cartservice: dotnet tests failed"
        fi

        echo "=== Unit Tests Complete ==="
