apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkoutservice
  template:
    metadata:
      labels:
        app: checkoutservice
    spec:
      containers:
        - name: checkoutservice
          image: image-registry.openshift-image-registry.svc:5000/online-boutique-cicd/checkoutservice:placeholder
          ports:
            - containerPort: 5050
---
apiVersion: v1
kind: Service
metadata:
  name: checkoutservice
  namespace: online-boutique
spec:
  selector:
    app: checkoutservice
  ports:
    - port: 5050
  type: ClusterIP
