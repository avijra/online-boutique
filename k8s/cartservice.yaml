apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      containers:
        - name: cartservice
          image: image-registry.openshift-image-registry.svc:5000/online-boutique-cicd/cartservice:placeholder
          ports:
            - containerPort: 7070
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: online-boutique
spec:
  selector:
    app: cartservice
  ports:
    - port: 7070
  type: ClusterIP
