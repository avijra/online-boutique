apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
    spec:
      containers:
        - name: productcatalogservice
          image: image-registry.openshift-image-registry.svc:5000/online-boutique-cicd/productcatalogservice:placeholder
          ports:
            - containerPort: 3550
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  namespace: online-boutique
spec:
  selector:
    app: productcatalogservice
  ports:
    - port: 3550
  type: ClusterIP
