apiVersion: apps/v1
kind: Deployment
metadata:
  name: shippingservice
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shippingservice
  template:
    metadata:
      labels:
        app: shippingservice
    spec:
      containers:
        - name: shippingservice
          image: image-registry.openshift-image-registry.svc:5000/online-boutique-cicd/shippingservice:placeholder
          ports:
            - containerPort: 50050
---
apiVersion: v1
kind: Service
metadata:
  name: shippingservice
  namespace: online-boutique
spec:
  selector:
    app: shippingservice
  ports:
    - port: 50050
  type: ClusterIP
