apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      containers:
        - name: emailservice
          image: image-registry.openshift-image-registry.svc:5000/online-boutique-cicd/emailservice:placeholder
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  namespace: online-boutique
spec:
  selector:
    app: emailservice
  ports:
    - port: 8080
  type: ClusterIP
